<!DOCTYPE html>
<html>
<head>
    <title>Mario Ghost Preview</title>
    <style>
        body { background: #050510; color: white; font-family: sans-serif; text-align: center; }
        canvas { border: 1px solid #333; margin: 10px; background: #0a0a1a; }
        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .card { padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; }
    </style>
</head>
<body>
    <h2>Visualizador do Fantasma (Super Mario)</h2>
    <p>Renderizado 100% via Canvas. Corpo vermelho, bigode e quepe com a letra M!</p>
    
    <div class="grid" id="container"></div>

    <script>
        var ghostBodyCache = {};

        function getGhostBodySprite(color) {
            if (ghostBodyCache[color]) return ghostBodyCache[color];
            var scale = 1.5;
            var c = document.createElement('canvas');
            c.width = 40 * scale;
            c.height = 40 * scale;
            var ctx = c.getContext('2d');
            var cx = c.width / 2;
            var cy = c.height / 2;
            
            ctx.shadowBlur = 10 * scale;
            ctx.shadowColor = color;
            ctx.fillStyle = color;
            
            ctx.beginPath();
            ctx.arc(cx, cy - 2 * scale, 12 * scale, Math.PI, 0);
            ctx.lineTo(cx + 12 * scale, cy + 12 * scale);
            
            var waves = 3;
            var waveWidth = (24 * scale) / waves;
            for (var w = 0; w < waves; w++) {
                ctx.quadraticCurveTo(
                    cx + 12 * scale - waveWidth * (w + 0.5), cy + 15 * scale,
                    cx + 12 * scale - waveWidth * (w + 1.0), cy + 12 * scale
                );
            }
            ctx.lineTo(cx - 12 * scale, cy - 2 * scale);
            ctx.fill();
            
            ghostBodyCache[color] = c;
            return c;
        }

        function drawGhostFace(ctx, gx, gy, dir, scale, state, isSpecial) {
            ctx.save();
            ctx.translate(gx, gy);
            if (isSpecial) {
                ctx.scale(0.75, 0.75);
                ctx.translate(0, 4 * scale);
            }
            var lGx = 0, lGy = 0;
            
            var eyeOffsetX = 0, eyeOffsetY = 0;
            if (dir === 'left') eyeOffsetX = -2 * scale;
            else if (dir === 'right') eyeOffsetX = 2 * scale;
            else if (dir === 'up') eyeOffsetY = -2 * scale;
            else if (dir === 'down') eyeOffsetY = 2 * scale;
            
            // Eyes Background
            ctx.fillStyle = '#ffffff';
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.arc(lGx - 5 * scale + eyeOffsetX, lGy - 6 * scale + eyeOffsetY, 4 * scale, 0, Math.PI*2); ctx.fill();
            // Sem contorno se corpo for vermelho, mas vamos deixar o contorno se for Special
            if (isSpecial) ctx.stroke();
            
            ctx.beginPath(); ctx.arc(lGx + 5 * scale + eyeOffsetX, lGy - 6 * scale + eyeOffsetY, 4 * scale, 0, Math.PI*2); ctx.fill();
            if (isSpecial) ctx.stroke();
            
            // Pupils
            var pupilOffsetX = (dir === 'left') ? -0.5 * scale : (dir === 'right') ? 0.5 * scale : 0;
            var pupilOffsetY = (dir === 'up') ? -0.5 * scale : (dir === 'down') ? 0.5 * scale : 0;
            
            if (state === 'scared') {
                ctx.fillStyle = '#ff0000';
                ctx.beginPath(); ctx.arc(lGx - 5 * scale + eyeOffsetX + pupilOffsetX, lGy - 6 * scale + eyeOffsetY + pupilOffsetY, 2 * scale, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(lGx + 5 * scale + eyeOffsetX + pupilOffsetX, lGy - 6 * scale + eyeOffsetY + pupilOffsetY, 2 * scale, 0, Math.PI*2); ctx.fill();
            } else {
                ctx.fillStyle = isSpecial ? '#000000' : '#0000dd';
                ctx.beginPath(); ctx.arc(lGx - 5 * scale + eyeOffsetX + pupilOffsetX, lGy - 6 * scale + eyeOffsetY + pupilOffsetY, 2 * scale, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(lGx + 5 * scale + eyeOffsetX + pupilOffsetX, lGy - 6 * scale + eyeOffsetY + pupilOffsetY, 2 * scale, 0, Math.PI*2); ctx.fill();
            }
            
            if (state === 'dead') {
                ctx.restore();
                return;
            }
            
            ctx.lineWidth = 1.5 * scale;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            if (state === 'angry') {
                ctx.strokeStyle = '#000000';
                ctx.beginPath(); ctx.moveTo(lGx - 8 * scale + eyeOffsetX, lGy - 11 * scale + eyeOffsetY); ctx.lineTo(lGx - 3 * scale + eyeOffsetX, lGy - 9 * scale + eyeOffsetY); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(lGx + 8 * scale + eyeOffsetX, lGy - 11 * scale + eyeOffsetY); ctx.lineTo(lGx + 3 * scale + eyeOffsetX, lGy - 9 * scale + eyeOffsetY); ctx.stroke();
                
                // Boca abaixo do bigode (deslocada pra baixo)
                ctx.beginPath();
                var my = lGy + 6 * scale;
                ctx.moveTo(lGx - 5 * scale, my);
                ctx.lineTo(lGx - 2.5 * scale, my - 2 * scale);
                ctx.lineTo(lGx, my);
                ctx.lineTo(lGx + 2.5 * scale, my - 2 * scale);
                ctx.lineTo(lGx + 5 * scale, my);
                ctx.stroke();
            } else if (state === 'scared') {
                ctx.strokeStyle = '#222';
                ctx.beginPath(); ctx.moveTo(lGx - 7 * scale + eyeOffsetX, lGy - 9 * scale + eyeOffsetY); ctx.lineTo(lGx - 3 * scale + eyeOffsetX, lGy - 11 * scale + eyeOffsetY); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(lGx + 7 * scale + eyeOffsetX, lGy - 9 * scale + eyeOffsetY); ctx.lineTo(lGx + 3 * scale + eyeOffsetX, lGy - 11 * scale + eyeOffsetY); ctx.stroke();
                
                ctx.beginPath();
                var my = lGy + 7 * scale;
                ctx.moveTo(lGx - 6 * scale, my);
                ctx.lineTo(lGx - 4 * scale, my - 1.5 * scale);
                ctx.lineTo(lGx - 2 * scale, my + 1.5 * scale);
                ctx.lineTo(lGx, my - 1.5 * scale);
                ctx.lineTo(lGx + 2 * scale, my + 1.5 * scale);
                ctx.lineTo(lGx + 4 * scale, my - 1.5 * scale);
                ctx.lineTo(lGx + 6 * scale, my);
                ctx.stroke();
            } else {
                // Boca normal empurrada pra baixo pro bigode não cobrir 100%
                ctx.strokeStyle = '#111111';
                ctx.beginPath();
                ctx.moveTo(lGx - 3 * scale, lGy + 6 * scale);
                ctx.lineTo(lGx + 3 * scale, lGy + 6 * scale);
                ctx.stroke();
            }
            ctx.restore();
        }

        function drawMarioAccessories(ctx, gx, gy, dir, scale, state) {
            if (state === 'dead') return;
            
            // 1. Bigode (mustache)
            ctx.save();
            ctx.translate(gx, gy);
            ctx.scale(0.75, 0.75);
            ctx.translate(0, 4 * scale); // acompanha o deslocamento do rosto
            
            var eyeOffsetX = 0, eyeOffsetY = 0;
            if (dir === 'left') eyeOffsetX = -2 * scale;
            else if (dir === 'right') eyeOffsetX = 2 * scale;
            else if (dir === 'up') eyeOffsetY = -2 * scale;
            else if (dir === 'down') eyeOffsetY = 2 * scale;
            
            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.ellipse(-2.5 * scale + eyeOffsetX, 2.5 * scale + eyeOffsetY, 4 * scale, 2 * scale, -0.2, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(2.5 * scale + eyeOffsetX, 2.5 * scale + eyeOffsetY, 4 * scale, 2 * scale, 0.2, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
            
            // 2. Quepe (Hat)
            ctx.save();
            ctx.translate(gx, gy - 11 * scale); // Topo da cabeça
            
            if (dir === 'left') ctx.rotate(-0.1);
            else if (dir === 'right') ctx.rotate(0.1);
            else if (dir === 'down') ctx.translate(0, 1 * scale);
            
            // Aba do boné
            ctx.fillStyle = '#aa0000'; // Um tom um pouco mais escuro que o corpo pra destacar
            var brimOffset = (dir === 'left') ? -3 * scale : (dir === 'right') ? 3 * scale : 0;
            ctx.beginPath();
            var brimY = (dir === 'up') ? 1 * scale : 2 * scale;
            ctx.ellipse(brimOffset, brimY, 12 * scale, 3 * scale, 0, 0, Math.PI*2);
            ctx.fill();
            
            // Domo do boné
            ctx.fillStyle = '#dd0000'; // Vermelho mario (diferente de ff0000 do corpo pra dar relevo)
            ctx.beginPath();
            ctx.arc(0, 1 * scale, 11 * scale, Math.PI, 0);
            ctx.fill();
            
            // Contorno pro chapéu destacar no corpo
            ctx.strokeStyle = '#550000';
            ctx.lineWidth = 1 * scale;
            ctx.beginPath();
            ctx.arc(0, 1 * scale, 11 * scale, Math.PI, 0);
            ctx.stroke();
            
            // Círculo branco com M
            ctx.fillStyle = '#ffffff';
            var logoX = (dir === 'left') ? -4 * scale : (dir === 'right') ? 4 * scale : 0;
            var logoY = (dir === 'up') ? -5 * scale : -4 * scale;
            ctx.beginPath();
            ctx.arc(logoX, logoY, 3.5 * scale, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#dd0000';
            ctx.font = 'bold ' + (5.5 * scale) + 'px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('M', logoX, logoY + 0.5 * scale);
            ctx.restore();
        }

        const states = ['normal', 'angry', 'scared', 'dead'];
        const dirs = ['up', 'down', 'left', 'right'];
        const container = document.getElementById('container');
        const canvases = [];

        states.forEach(state => {
            dirs.forEach(dir => {
                var card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<div>${state.toUpperCase()} - ${dir.toUpperCase()}</div>`;
                var canvas = document.createElement('canvas');
                canvas.width = 100;
                canvas.height = 100;
                card.appendChild(canvas);
                container.appendChild(card);
                canvases.push({ ctx: canvas.getContext('2d'), state, dir });
            });
        });

        function renderAll() {
            canvases.forEach(item => {
                var ctx = item.ctx;
                ctx.clearRect(0, 0, 100, 100);
                
                var gx = 50, gy = 50;
                var isSpecial = true;
                
                // O corpo do Mario será vermelho (exceto se scared)
                var colorToUse = item.state === 'scared' ? '#0000ff' : '#ff0000'; 
                
                if (item.state !== 'dead') {
                    var bodySprite = getGhostBodySprite(colorToUse);
                    ctx.drawImage(bodySprite, gx - bodySprite.width/2, gy - bodySprite.height/2);
                }
                
                drawGhostFace(ctx, gx, gy, item.dir, 1.5, item.state, isSpecial);
                if (isSpecial) {
                    drawMarioAccessories(ctx, gx, gy, item.dir, 1.5, item.state);
                }
            });
            requestAnimationFrame(renderAll);
        }
        renderAll();
    </script>
</body>
</html>
