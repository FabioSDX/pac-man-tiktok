<!DOCTYPE html>
<html>
<head>
    <title>Michael Jackson Ghost Preview</title>
    <style>
        body { background: #050510; color: white; font-family: sans-serif; text-align: center; }
        canvas { border: 1px solid #333; margin: 10px; background: #0a0a1a; }
        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .card { padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; }
    </style>
</head>
<body>
    <h2>Visualizador do Fantasma (Michael Jackson)</h2>
    <p>Renderizado 100% via código Canvas nativo, usando a mesma engine do jogo principal!</p>
    
    <div class="grid" id="container"></div>

    <script>
        // --- Core Engine Cloned from pacman.js ---
        var pacmanTileSize = 40;
        var ghostBodyCache = {};

        function getGhostBodySprite(color) {
            if (ghostBodyCache[color]) return ghostBodyCache[color];
            var scale = 1.5;
            var c = document.createElement('canvas');
            c.width = 40 * scale;
            c.height = 40 * scale;
            var ctx = c.getContext('2d');
            var cx = c.width / 2;
            var cy = c.height / 2;
            
            ctx.shadowBlur = 10 * scale;
            ctx.shadowColor = color;
            ctx.fillStyle = color;
            
            ctx.beginPath();
            ctx.arc(cx, cy - 2 * scale, 12 * scale, Math.PI, 0);
            ctx.lineTo(cx + 12 * scale, cy + 12 * scale);
            
            // Wavy bottom
            var waves = 3;
            var waveWidth = (24 * scale) / waves;
            for (var w = 0; w < waves; w++) {
                ctx.quadraticCurveTo(
                    cx + 12 * scale - waveWidth * (w + 0.5), cy + 15 * scale,
                    cx + 12 * scale - waveWidth * (w + 1.0), cy + 12 * scale
                );
            }
            ctx.lineTo(cx - 12 * scale, cy - 2 * scale);
            ctx.fill();
            
            ghostBodyCache[color] = c;
            return c;
        }

        function drawGhostFace(ctx, gx, gy, dir, scale, state, isMichael) {
            ctx.save();
            ctx.translate(gx, gy);
            if (isMichael) {
                ctx.scale(0.75, 0.75);
                ctx.translate(0, 4 * scale);
            }
            var lGx = 0, lGy = 0;
            
            var eyeOffsetX = 0, eyeOffsetY = 0;
            if (dir === 'left') eyeOffsetX = -2 * scale;
            else if (dir === 'right') eyeOffsetX = 2 * scale;
            else if (dir === 'up') eyeOffsetY = -2 * scale;
            else if (dir === 'down') eyeOffsetY = 2 * scale;
            
            // Eyes Background
            ctx.fillStyle = '#ffffff';
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.arc(lGx - 5 * scale + eyeOffsetX, lGy - 6 * scale + eyeOffsetY, 4 * scale, 0, Math.PI*2); ctx.fill();
            if (isMichael) ctx.stroke();
            ctx.beginPath(); ctx.arc(lGx + 5 * scale + eyeOffsetX, lGy - 6 * scale + eyeOffsetY, 4 * scale, 0, Math.PI*2); ctx.fill();
            if (isMichael) ctx.stroke();
            
            // Pupils
            var pupilOffsetX = (dir === 'left') ? -0.5 * scale : (dir === 'right') ? 0.5 * scale : 0;
            var pupilOffsetY = (dir === 'up') ? -0.5 * scale : (dir === 'down') ? 0.5 * scale : 0;
            
            if (state === 'scared') {
                ctx.fillStyle = '#ff0000';
                ctx.beginPath(); ctx.arc(lGx - 5 * scale + eyeOffsetX + pupilOffsetX, lGy - 6 * scale + eyeOffsetY + pupilOffsetY, 2 * scale, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(lGx + 5 * scale + eyeOffsetX + pupilOffsetX, lGy - 6 * scale + eyeOffsetY + pupilOffsetY, 2 * scale, 0, Math.PI*2); ctx.fill();
            } else {
                ctx.fillStyle = isMichael ? '#000000' : '#0000dd';
                ctx.beginPath(); ctx.arc(lGx - 5 * scale + eyeOffsetX + pupilOffsetX, lGy - 6 * scale + eyeOffsetY + pupilOffsetY, 2 * scale, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(lGx + 5 * scale + eyeOffsetX + pupilOffsetX, lGy - 6 * scale + eyeOffsetY + pupilOffsetY, 2 * scale, 0, Math.PI*2); ctx.fill();
            }
            
            if (state === 'dead') {
                ctx.restore();
                return; // Dead ghosts are just eyes
            }
            
            // Expressions
            ctx.lineWidth = 1.5 * scale;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            if (state === 'angry') {
                ctx.strokeStyle = '#000000';
                // Angry Eyebrows \ /
                ctx.beginPath(); ctx.moveTo(lGx - 8 * scale + eyeOffsetX, lGy - 11 * scale + eyeOffsetY); ctx.lineTo(lGx - 3 * scale + eyeOffsetX, lGy - 9 * scale + eyeOffsetY); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(lGx + 8 * scale + eyeOffsetX, lGy - 11 * scale + eyeOffsetY); ctx.lineTo(lGx + 3 * scale + eyeOffsetX, lGy - 9 * scale + eyeOffsetY); ctx.stroke();
                
                // Angry Mouth (sharp zigzag)
                ctx.beginPath();
                var my = lGy + 3 * scale;
                ctx.moveTo(lGx - 5 * scale, my);
                ctx.lineTo(lGx - 2.5 * scale, my - 2 * scale);
                ctx.lineTo(lGx, my);
                ctx.lineTo(lGx + 2.5 * scale, my - 2 * scale);
                ctx.lineTo(lGx + 5 * scale, my);
                ctx.stroke();
            } else if (state === 'scared') {
                ctx.strokeStyle = '#222';
                // Scared Eyebrows / \
                ctx.beginPath(); ctx.moveTo(lGx - 7 * scale + eyeOffsetX, lGy - 9 * scale + eyeOffsetY); ctx.lineTo(lGx - 3 * scale + eyeOffsetX, lGy - 11 * scale + eyeOffsetY); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(lGx + 7 * scale + eyeOffsetX, lGy - 9 * scale + eyeOffsetY); ctx.lineTo(lGx + 3 * scale + eyeOffsetX, lGy - 11 * scale + eyeOffsetY); ctx.stroke();
                
                // Wavy/Zigzag Mouth (longer)
                ctx.beginPath();
                var my = lGy + 5 * scale;
                ctx.moveTo(lGx - 6 * scale, my);
                ctx.lineTo(lGx - 4 * scale, my - 1.5 * scale);
                ctx.lineTo(lGx - 2 * scale, my + 1.5 * scale);
                ctx.lineTo(lGx, my - 1.5 * scale);
                ctx.lineTo(lGx + 2 * scale, my + 1.5 * scale);
                ctx.lineTo(lGx + 4 * scale, my - 1.5 * scale);
                ctx.lineTo(lGx + 6 * scale, my);
                ctx.stroke();
            } else {
                // Normal Mouth (straight small line)
                ctx.strokeStyle = '#111111';
                ctx.beginPath();
                ctx.moveTo(lGx - 3 * scale, lGy + 4 * scale);
                ctx.lineTo(lGx + 3 * scale, lGy + 4 * scale);
                ctx.stroke();
            }
            
            ctx.restore();
        }

        function drawMichaelJacksonAccessories(ctx, gx, gy, dir, scale, state) {
            if (state === 'dead') return;
            
            ctx.save();
            ctx.translate(gx, gy - 12 * scale);
            
            if (dir === 'left') ctx.rotate(-0.1);
            else if (dir === 'right') ctx.rotate(0.1);
            else if (dir === 'down') ctx.translate(0, 2 * scale);
            
            ctx.fillStyle = '#111111';
            ctx.beginPath();
            ctx.ellipse(0, 0, 12 * scale, 2.5 * scale, 0, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.beginPath();
            ctx.rect(-7 * scale, -8 * scale, 14 * scale, 8 * scale);
            ctx.fill();
            
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(-7 * scale, -3 * scale, 14 * scale, 2 * scale);
            ctx.restore();
            
            var time = Date.now();
            var bobbing = Math.sin(time / 100) * 3 * scale;
            var gloveX = gx + 12 * scale;
            var gloveY = gy + bobbing;
            
            if (dir === 'left') gloveX = gx - 12 * scale;
            
            ctx.save();
            ctx.translate(gloveX, gloveY);
            
            ctx.fillStyle = '#e0e0e0';
            ctx.beginPath();
            ctx.arc(0, 0, 4 * scale, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#ffffff';
            if (Math.floor(time / 50) % 2 === 0) ctx.fillRect(-2 * scale, -2 * scale, 1 * scale, 1 * scale);
            if (Math.floor(time / 70) % 2 === 0) ctx.fillRect(1 * scale, 1 * scale, 1 * scale, 1 * scale);
            if (Math.floor(time / 90) % 2 === 0) ctx.fillRect(2 * scale, -1 * scale, 1 * scale, 1 * scale);
            ctx.restore();
        }

        // --- Render Loop for Previews ---
        const states = ['normal', 'angry', 'scared', 'dead'];
        const dirs = ['up', 'down', 'left', 'right'];
        const container = document.getElementById('container');
        const canvases = [];

        states.forEach(state => {
            dirs.forEach(dir => {
                var card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<div>${state.toUpperCase()} - ${dir.toUpperCase()}</div>`;
                var canvas = document.createElement('canvas');
                canvas.width = 100;
                canvas.height = 100;
                card.appendChild(canvas);
                container.appendChild(card);
                
                canvases.push({ ctx: canvas.getContext('2d'), state, dir });
            });
        });

        function renderAll() {
            canvases.forEach(item => {
                var ctx = item.ctx;
                ctx.clearRect(0, 0, 100, 100);
                
                var gx = 50, gy = 50;
                var isMichael = true; // For preview, assume it's MJ to show his face logic
                var colorToUse = item.state === 'scared' ? '#0000ff' : '#ffffff';
                
                if (item.state !== 'dead') {
                    var bodySprite = getGhostBodySprite(colorToUse);
                    ctx.drawImage(bodySprite, gx - bodySprite.width/2, gy - bodySprite.height/2);
                }
                
                drawGhostFace(ctx, gx, gy, item.dir, 1.5, item.state, isMichael);
                if (isMichael) {
                    drawMichaelJacksonAccessories(ctx, gx, gy, item.dir, 1.5, item.state);
                }
            });
            requestAnimationFrame(renderAll);
        }
        
        renderAll();
    </script>
</body>
</html>
