<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Streamers Ativos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-color: #f8fafc;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --tiktok: #ff0050;
            --youtube: #ff0000;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* --- TELA DE LOGIN --- */
        #loginScreen {
            background: var(--panel-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        #loginScreen h1 {
            margin-top: 0;
            font-size: 24px;
        }

        #loginScreen input {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            border: 1px solid #334155;
            border-radius: 8px;
            background: #0f172a;
            color: #fff;
            box-sizing: border-box;
            outline: none;
            font-size: 16px;
        }

        #loginScreen button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 16px;
        }

        #loginScreen button:hover {
            background: var(--primary-hover);
        }

        .error-msg {
            color: #ef4444;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
        }

        /* --- TELA DO PAINEL --- */
        #dashboardScreen {
            display: none;
            width: 100%;
            min-height: 100vh;
            padding: 40px 20px;
            box-sizing: border-box;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #334155;
            padding-bottom: 20px;
        }

        .header h1 {
            margin: 0;
            font-size: 28px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .count-badge {
            background: #334155;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        .card {
            background: var(--panel-bg);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .platform-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        .platform-tiktok { background: var(--tiktok); color: white; }
        .platform-youtube { background: var(--youtube); color: white; }

        .username {
            font-size: 20px;
            font-weight: 800;
            margin: 0 0 15px 0;
            word-break: break-all;
        }

        .action-btn {
            background: #f8fafc;
            color: #0f172a;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
            width: 100%;
            box-sizing: border-box;
            transition: 0.2s;
        }

        .action-btn:hover {
            background: #cbd5e1;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px;
            color: #94a3b8;
            background: var(--panel-bg);
            border-radius: 12px;
            border: 1px dashed #334155;
        }

        .chart-container {
            width: 100%;
            max-width: 1000px;
            background: var(--panel-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            box-sizing: border-box;
        }
        .chart-container h2 {
            margin-top: 0;
            font-size: 18px;
            color: #94a3b8;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <!-- TELA DE LOGIN -->
    <div id="loginScreen">
        <h1>Acesso Admin</h1>
        <div id="errorMsg" class="error-msg">Senha incorreta!</div>
        <input type="password" id="passwordInput" placeholder="Digite a senha" onkeypress="handleEnter(event)">
        <button onclick="login()">Entrar</button>
    </div>

    <!-- TELA DO PAINEL -->
    <div id="dashboardScreen">
        <div class="header">
            <h1>Xtremers Ao Vivo</h1>
            <div class="count-badge">Total: <span id="totalCount">0</span></div>
        </div>
        
        <div class="chart-container">
            <h2>Fluxo de Dados do Servidor (Eventos/seg)</h2>
            <canvas id="flowChart" height="80"></canvas>
        </div>

        <div class="grid" id="streamersGrid">
            <!-- Cards gerados via JS -->
        </div>
    </div>

    <script>
        let adminPassword = localStorage.getItem('adminPassword') || '';
        let pollInterval = null;
        let flowChart = null;

        // Se já tem senha salva, tenta logar direto
        if (adminPassword) {
            checkPasswordAndLoad();
        }

        function handleEnter(e) {
            if (e.key === 'Enter') login();
        }

        function login() {
            adminPassword = document.getElementById('passwordInput').value;
            checkPasswordAndLoad();
        }

        async function checkPasswordAndLoad() {
            try {
                const res = await fetch(`/proxy.php?path=/api/streamers?password=${encodeURIComponent(adminPassword)}`);
                if (res.status === 401) {
                    document.getElementById('errorMsg').style.display = 'block';
                    localStorage.removeItem('adminPassword');
                    adminPassword = '';
                    showScreen('login');
                } else if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('adminPassword', adminPassword);
                    document.getElementById('errorMsg').style.display = 'none';
                    showScreen('dashboard');
                    renderData(data);
                    
                    // Iniciar pooling a cada 5 segundos
                    if (pollInterval) clearInterval(pollInterval);
                    pollInterval = setInterval(fetchData, 5000);
                } else {
                    alert("Erro ao conectar com o servidor.");
                }
            } catch(e) {
                alert("Servidor parece estar offline.");
            }
        }

        async function fetchData() {
            if (!adminPassword) return;
            try {
                const res = await fetch(`/proxy.php?path=/api/streamers?password=${encodeURIComponent(adminPassword)}`);
                if (res.status === 401) {
                    clearInterval(pollInterval);
                    showScreen('login');
                } else if (res.ok) {
                    const data = await res.json();
                    renderData(data);
                }
            } catch(e) {
                console.log("Erro ao atualizar dados: " + e.message);
            }
        }

        function renderData(data) {
            document.getElementById('totalCount').innerText = data.count || 0;
            const grid = document.getElementById('streamersGrid');
            grid.innerHTML = '';

            if (!data.streamers || data.streamers.length === 0) {
                grid.innerHTML = `<div class="empty-state">
                    <h3>Nenhum xtremer ao vivo no momento</h3>
                    <p>Aguarde alguém conectar ao jogo pelo TikTok ou YouTube.</p>
                </div>`;
                return;
            }

            data.streamers.forEach(s => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <span class="platform-badge platform-${s.platform}">${s.platform}</span>
                    <h2 class="username">@${s.username}</h2>
                    <a href="${s.link}" target="_blank" class="action-btn">Assistir Live</a>
                `;
                grid.appendChild(card);
            });

            if (data.metrics) {
                updateChart(data.metrics);
            }
        }

        function initChart() {
            const ctx = document.getElementById('flowChart').getContext('2d');
            const gradient = ctx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, 'rgba(59, 130, 246, 0.5)'); // primary color with opacity
            gradient.addColorStop(1, 'rgba(59, 130, 246, 0)');

            flowChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: new Array(60).fill(''),
                    datasets: [{
                        label: 'Eventos/seg',
                        data: new Array(60).fill(0),
                        borderColor: '#3b82f6',
                        backgroundColor: gradient,
                        borderWidth: 2,
                        pointRadius: 0,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    animation: { duration: 0 },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
                        x: { grid: { display: false }, ticks: { display: false } }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: { enabled: false }
                    }
                }
            });
        }

        function updateChart(metrics) {
            if (!flowChart) initChart();
            flowChart.data.datasets[0].data = metrics;
            flowChart.update();
        }

        function showScreen(screen) {
            document.getElementById('loginScreen').style.display = screen === 'login' ? 'block' : 'none';
            document.getElementById('dashboardScreen').style.display = screen === 'dashboard' ? 'flex' : 'none';
            if (screen === 'dashboard') {
                document.body.style.alignItems = 'flex-start';
            } else {
                document.body.style.alignItems = 'center';
            }
        }
    </script>
</body>
</html>
